organization:
  name: QiuXiangBa
  url: https://github.com/QiuXiangBa
  project_board:
    number: 2
    url: https://github.com/users/QiuXiangBa/projects/2

repos:
  e-store-java:
    path: repos/backend/e-store
    git: git@selfgithub:QiuXiangBa/e-store-java.git
    desc: Java backend services (admin/app/dao/objectstorage)
    lang: Java
    status: active
    worktrees:
      convention: "repos/backend/e-store-<feature-name>"

  e-store-admin-ui:
    path: repos/frontend/admin-ui
    git: git@selfgithub:QiuXiangBa/e-store-admin-ui.git
    desc: React admin UI
    lang: TypeScript
    status: active
    worktrees:
      convention: "repos/frontend/admin-ui-<feature-name>"

  mall-webapp:
    path: repos/frontend/mall-webapp
    git: git@selfgithub:QiuXiangBa/mall-webapp.git
    desc: customer-facing mall webapp
    lang: TypeScript
    status: active
    worktrees:
      convention: "repos/frontend/mall-webapp-<feature-name>"

  mall-pc:
    path: repos/frontend/mall-pc
    git: git@selfgithub:QiuXiangBa/mall-pc.git
    desc: customer-facing mall pc web app
    lang: TypeScript
    status: active
    worktrees:
      convention: "repos/frontend/mall-pc-<feature-name>"

  e-store-docs:
    path: repos/docs
    git: https://github.com/QiuXiangBa/e-store-docs.git
    desc: centralized product and engineering docs
    lang: Markdown
    status: active

infrastructure:
  object_storage:
    provider: aws-s3
    note: product/category and brand images are uploaded by client direct-to-s3 via presigned URL
  local_dev:
    frontend:
      admin_ui: http://localhost:5173
      mall_webapp: http://localhost:5174
      mall_pc: http://localhost:5175
    backend:
      e_store: http://localhost:8092
