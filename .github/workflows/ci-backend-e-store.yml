name: CI Backend E-Store

on:
  pull_request:
    paths:
      - "repos/backend/e-store/**"
      - ".github/workflows/ci-backend-e-store.yml"
  push:
    branches:
      - main
    paths:
      - "repos/backend/e-store/**"
      - ".github/workflows/ci-backend-e-store.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: mvn -f repos/backend/e-store/pom.xml -q -DskipTests compile

      - name: Unit Test
        run: mvn -f repos/backend/e-store/pom.xml -q -DskipITs test

